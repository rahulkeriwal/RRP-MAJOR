<!DOCTYPE html>
<html>
<head>
<title>User Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}
.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#ff9800;
color:white;
}
.container{text-align:center;padding:20px;}
.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-top:20px;
}
button{
padding:10px 15px;
background:#ff9800;
border:none;
color:white;
border-radius:5px;
margin:5px;
}
</style>
</head>

<body>

<div class="header">
<h3>User Dashboard</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
<h2 id="username">Loading...</h2>
<p>Wallet Balance: ₹<span id="wallet">0</span></p>
<button onclick="joinTelegram()">Join Telegram</button>
</div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* 🔥 YAHAN FIREBASE CONFIG PASTE KARO */
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged((user)=>{
if(user){
db.collection("users").doc(user.uid).get().then((doc)=>{
if(doc.exists){
document.getElementById("username").innerText=doc.data().name;
document.getElementById("wallet").innerText=doc.data().wallet;
}
});
}else{
window.location.href="login.html";
}
});

function logout(){
auth.signOut();
window.location.href="login.html";
}

function joinTelegram(){
window.open("https://t.me/rrp_major","_blank");
}

</script>

</body>
</html>
