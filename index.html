<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RRP Earn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0d1b2a; color: white; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.6); align-items: center; }
        .header button { background: #f39c12; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Banner Update */
        .top-banner img { width: 100%; max-width: 420px; border-radius: 15px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        .notice { background: #f39c12; padding: 10px; margin: 15px 0; font-weight: bold; font-size: 14px; }
        
        /* Profile Area */
        #profileSection { background: rgba(255,255,255,0.1); margin: 20px; padding: 25px; border-radius: 15px; display: none; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Forms */
        .auth-page { display: none; padding: 30px 20px; }
        input { width: 90%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; outline: none; }
        .btn-main { width: 95%; padding: 14px; background: #f39c12; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: none; justify-content: space-around; padding: 12px 0; }
        .bottom-nav button { color: #333; border: none; background: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h3>RRP Earn</h3>
    <div id="authMenu">
        <button onclick="showPage('loginPage')">Login</button>
        <button onclick="showPage('registerPage')">Register</button>
    </div>
    <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="top-banner">
    <img src="Gemini_Generated_Image_wg6zcowg6zcowg6z.jpg" alt="RRM Banner">
</div>

<div class="notice">🔥 Join Telegram & Earn 130₹ Instantly 🔥</div>

<div id="homePage">
    <div id="profileSection">
        <h2 id="userName">User</h2>
        <h1>₹ <span id="userWallet">0</span></h1>
    </div>
    <div id="guestMsg" style="margin-top: 50px;">
        <h3>Welcome! Please Login or Register.</h3>
    </div>
</div>

<div id="loginPage" class="auth-page">
    <h2>Login</h2>
    <input type="email" id="lEmail" placeholder="Email Address">
    <input type="password" id="lPass" placeholder="Password">
    <button class="btn-main" id="lBtn" onclick="login()">Login Now</button>
    <p onclick="showPage('homePage')" style="cursor:pointer; margin-top:20px;">← Back</p>
</div>

<div id="registerPage" class="auth-page">
    <h2>Create Account</h2>
    <input type="text" id="rName" placeholder="Your Full Name">
    <input type="email" id="rEmail" placeholder="Email Address">
    <input type="password" id="rPass" placeholder="Create Password">
    <button class="btn-main" id="rBtn" onclick="register()">Register & Get ₹130</button>
    <p onclick="showPage('homePage')" style="cursor:pointer; margin-top:20px;">← Back</p>
</div>

<div class="bottom-nav" id="bottomNav">
    <button onclick="showPage('homePage')">Home</button>
    <button>Team</button>
    <button>Task</button>
    <button>Withdraw</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// !!! APNA CONFIG YAHA DALEIN !!!
const firebaseConfig = {

  apiKey: "AIzaSyCIXwtirHUvLfReJziJ7Oyy975Kpr5ZDOU",

  authDomain: "rrp-earn-app.firebaseapp.com",

  projectId: "rrp-earn-app",

  storageBucket: "rrp-earn-app.firebasestorage.app",

  messagingSenderId: "808141347086",

  appId: "1:808141347086:web:909793490facec38aadf5f",

  measurementId: "G-J6X9KHPXJQ"

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function showPage(id) {
    document.getElementById('homePage').style.display = id === 'homePage' ? 'block' : 'none';
    document.getElementById('loginPage').style.display = id === 'loginPage' ? 'block' : 'none';
    document.getElementById('registerPage').style.display = id === 'registerPage' ? 'block' : 'none';
}

// Fixed Registration: Registration ke turant baad user auto-login hota hai
function register() {
    const name = document.getElementById('rName').value.trim();
    const email = document.getElementById('rEmail').value.trim();
    const pass = document.getElementById('rPass').value;
    const btn = document.getElementById('rBtn');

    if(!name || !email || !pass) { alert("Sari details bhariye!"); return; }
    btn.disabled = true;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
        return db.collection("users").doc(cred.user.uid).set({
            name: name,
            wallet: 130,
            email: email
        });
    })
    .then(() => {
        alert("Registration Successful! Welcome.");
        showPage('homePage');
    })
    .catch(err => { 
        alert(err.message); 
        btn.disabled = false; 
    });
}

// Fixed Login
function login() {
    const email = document.getElementById('lEmail').value.trim();
    const pass = document.getElementById('lPass').value;
    const btn = document.getElementById('lBtn');

    if(!email || !pass) { alert("Details dalein!"); return; }
    btn.disabled = true;

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("Login Successful!");
        showPage('homePage');
    })
    .catch(err => { 
        alert("Login Error: " + err.message); 
        btn.disabled = false; 
    });
}

function logout() { auth.signOut().then(() => location.reload()); }

// Auth Listener: Ye check karta hai login hai ya nahi
auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('profileSection').style.display = 'block';
        document.getElementById('guestMsg').style.display = 'none';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('authMenu').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
        
        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('userName').innerText = "Hi, " + doc.data().name;
                document.getElementById('userWallet').innerText = doc.data().wallet;
            }
        });
    }
});
</script>
</body>
</html>
