<!DOCTYPE html>
<html>
<head>
<title>RRP Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* Header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.3);
}

.header button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#ff9800;
color:white;
font-weight:bold;
}

/* TOP IMAGE */
.top-banner{
width:100%;
text-align:center;
margin-top:10px;
}

.top-banner img{
width:90%;
max-width:420px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

/* Notice */
.notice{
background:#ff9800;
padding:8px;
text-align:center;
font-weight:bold;
margin-top:10px;
}

/* Home */
.home-section{
padding:20px;
text-align:center;
}

/* 4 ICONS */
.top-section{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:20px;
}

.box{
flex:1;
height:95px;
background:white;
border-radius:18px;
color:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
font-weight:bold;
font-size:13px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.box img{
width:35px;
margin-bottom:6px;
}

/* LIVE WITHDRAW */
.live-box{
margin-top:25px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
}

.withdraw-container{
height:130px;
overflow:hidden;
position:relative;
}

#withdrawList{
display:flex;
flex-direction:column;
}

.withdraw-item{
background:white;
color:black;
margin:6px 0;
padding:6px;
border-radius:8px;
font-size:14px;
font-weight:bold;
}

/* Profile */
.profile{
margin-top:25px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
display:none;
}

/* Auth */
.auth-page{
display:none;
padding:30px 20px;
text-align:center;
}

.auth-page input{
width:90%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

.auth-page button{
padding:12px;
width:95%;
background:#ff9800;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
margin-top:10px;
}

/* Bottom Nav */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
color:black;
display:none;
justify-content:space-around;
padding:12px 0;
}

.bottom-nav button{
background:none;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h3>RRP Earn</h3>
<div>
<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>
</div>
</div>

<!-- TOP IMAGE -->
<div class="top-banner">
<img src="https://i.ibb.co/S7yF8s7h/your-image.jpg" alt="RRP Banner">
</div>

<div class="notice">
🔥 Join Telegram & Earn 130₹ Instantly 🔥
</div>

<div class="home-section" id="homePage">

<div class="top-section">
<a href="https://t.me/rrp_major" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Telegram
</a>

<a href="https://whatsapp.com" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
WhatsApp
</a>

<a href="#" class="box">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
Chat Us
</a>

<a href="https://youtube.com" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
YouTube
</a>
</div>

<!-- LIVE WITHDRAW -->
<div class="live-box">
<h3>🔥 Live Withdraw</h3>
<div class="withdraw-container">
<div id="withdrawList"></div>
</div>
</div>

<!-- PROFILE -->
<div class="profile" id="profileSection">
<h2 id="username">Guest User</h2>
<h1>₹ <span id="wallet">0</span></h1>
</div>

</div>

<!-- LOGIN -->
<div class="auth-page" id="loginPage">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="loginUser()">Login</button>
<button onclick="goHome()">Back</button>
</div>

<!-- REGISTER -->
<div class="auth-page" id="registerPage">
<h2>Register</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<button onclick="registerUser()">Register</button>
<button onclick="goHome()">Back</button>
</div>

<div class="bottom-nav" id="bottomNav">
<button onclick="goHome()">Home</button>
<button>Team</button>
<button>Task</button>
<button>Withdraw</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIXwtirHUvLfReJziJ7Oyy975Kpr5ZDOU",
  authDomain: "rrp-earn-app.firebaseapp.com",
  projectId: "rrp-earn-app",
  storageBucket: "rrp-earn-app.firebasestorage.app",
  messagingSenderId: "808141347086",
  appId: "1:808141347086:web:909793490facec38aadf5f",
  measurementId: "G-J6X9KHPXJQ"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

function showLogin(){homePage.style.display="none";registerPage.style.display="none";loginPage.style.display="block";}
function showRegister(){homePage.style.display="none";loginPage.style.display="none";registerPage.style.display="block";}
function goHome(){homePage.style.display="block";loginPage.style.display="none";registerPage.style.display="none";}

function registerUser(){
if(password.value!==confirmPassword.value){alert("Passwords do not match");return;}
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(user=>{
db.collection("users").doc(user.user.uid).set({
name:name.value,email:email.value,wallet:0,createdAt:new Date()
});
alert("Registration Successful!");goHome();
}).catch(e=>alert(e.message));
}

function loginUser(){
auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value)
.then(()=>{alert("Login Successful!");goHome();})
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
profileSection.style.display="block";
bottomNav.style.display="flex";
db.collection("users").doc(user.uid).onSnapshot(doc=>{
if(doc.exists){
username.innerText=doc.data().name;
wallet.innerText=doc.data().wallet;
}
});
}else{
profileSection.style.display="none";
bottomNav.style.display="none";
}
});

/* FAST CONTINUOUS LIVE WITHDRAW */
const names=["Rahul","Amit","Suman","Rohit","Pooja","Vikas","Neha","Arjun","Karan","Sneha","Deepak","Priya","Ankit","Riya","Manish","Komal"];
const container=document.getElementById("withdrawList");

function createItem(){
let randomName=names[Math.floor(Math.random()*names.length)];
let randomAmount=Math.floor(Math.random()*4400)+100;
let div=document.createElement("div");
div.className="withdraw-item";
div.innerText=randomName+" Withdraw ₹"+randomAmount;
return div;
}

for(let i=0;i<25;i++){container.appendChild(createItem());}
container.innerHTML+=container.innerHTML;

let scrollSpeed=3;
let scrollPosition=0;

function smoothScroll(){
scrollPosition+=scrollSpeed;
container.style.transform=`translateY(-${scrollPosition}px)`;
if(scrollPosition>=container.scrollHeight/2){scrollPosition=0;}
requestAnimationFrame(smoothScroll);
}
smoothScroll();
</script>

</body>
</html>
