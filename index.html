<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RRP Earn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
        }

        .header button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #ff9800;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* TOP BANNER - UPDATED IMAGE */
        .top-banner {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        .top-banner img {
            max-width: 90%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .notice {
            background: #ff9800;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Home Section */
        .home-section { padding: 20px; text-align: center; padding-bottom: 80px; }
        .top-section { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .box {
            flex: 1; height: 90px; background: white; border-radius: 15px; color: black;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-decoration: none; font-weight: bold; font-size: 11px;
        }
        .box img { width: 30px; margin-bottom: 5px; }

        /* Profile Area */
        .profile {
            margin-top: 20px; background: rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 15px; display: none;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Auth Pages */
        .auth-page { display: none; padding: 40px 20px; text-align: center; }
        .auth-page input {
            width: 90%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none; font-size: 16px;
        }
        .auth-page button {
            padding: 12px; width: 95%; background: #ff9800;
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: white; display: none;
            justify-content: space-around; padding: 12px 0;
        }
        .bottom-nav button { background: none; border: none; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="header">
    <h3>RRP Earn</h3>
    <div id="authButtons">
        <button onclick="showLogin()">Login</button>
        <button onclick="showRegister()">Register</button>
    </div>
    <div id="logoutBtn" style="display:none;">
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="top-banner">
    <img src="Gemini_Generated_Image_wg6zcowg6zcowg6z.jpg" alt="RRM Banner">
</div>

<div class="notice">🔥 Join Telegram & Earn 130₹ Instantly 🔥</div>

<div class="home-section" id="homePage">
    <div class="top-section">
        <a href="#" class="box"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">Telegram</a>
        <a href="#" class="box"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">WhatsApp</a>
        <a href="#" class="box"><img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">Chat Us</a>
        <a href="#" class="box"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">YouTube</a>
    </div>

    <div class="profile" id="profileSection">
        <h2 id="dispName">Welcome</h2>
        <h1>₹ <span id="dispWallet">0</span></h1>
    </div>
</div>

<div class="auth-page" id="loginPage">
    <h2>Login</h2>
    <input type="email" id="lEmail" placeholder="Email Address">
    <input type="password" id="lPass" placeholder="Password">
    <button id="loginBtn" onclick="loginUser()">Login</button>
    <button style="background:#444; margin-top:10px;" onclick="goHome()">Back</button>
</div>

<div class="auth-page" id="registerPage">
    <h2>Register</h2>
    <input type="text" id="rName" placeholder="Full Name">
    <input type="email" id="rEmail" placeholder="Email Address">
    <input type="password" id="rPass" placeholder="Password">
    <input type="password" id="rCPass" placeholder="Confirm Password">
    <button id="regBtn" onclick="registerUser()">Register Now</button>
    <button style="background:#444; margin-top:10px;" onclick="goHome()">Back</button>
</div>

<div class="bottom-nav" id="bottomNav">
    <button onclick="goHome()">Home</button>
    <button>Team</button>
    <button>Task</button>
    <button>Withdraw</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function showLogin(){ 
    document.getElementById("homePage").style.display="none"; 
    document.getElementById("registerPage").style.display="none"; 
    document.getElementById("loginPage").style.display="block"; 
}
function showRegister(){ 
    document.getElementById("homePage").style.display="none"; 
    document.getElementById("loginPage").style.display="none"; 
    document.getElementById("registerPage").style.display="block"; 
}
function goHome(){ 
    document.getElementById("homePage").style.display="block"; 
    document.getElementById("loginPage").style.display="none"; 
    document.getElementById("registerPage").style.display="none"; 
}

// LOGIN FUNCTION FIX
function loginUser(){
    const email = document.getElementById("lEmail").value.trim();
    const pass = document.getElementById("lPass").value;
    const btn = document.getElementById("loginBtn");

    if(!email || !pass){ alert("Please enter email and password"); return; }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("Login Successful!");
        goHome();
    })
    .catch(err => {
        alert("Login Error: " + err.message);
        btn.disabled = false;
        btn.innerText = "Login";
    });
}

// REGISTER FUNCTION
function registerUser(){
    const name = document.getElementById("rName").value.trim();
    const email = document.getElementById("rEmail").value.trim();
    const pass = document.getElementById("rPass").value;
    const cPass = document.getElementById("rCPass").value;
    const btn = document.getElementById("regBtn");

    if(pass !== cPass){ alert("Passwords do not match!"); return; }
    if(!name || !email || !pass){ alert("Fill all details!"); return; }

    btn.disabled = true;
    auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
        return db.collection("users").doc(cred.user.uid).set({
            name: name,
            email: email,
            wallet: 130,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    })
    .then(() => {
        alert("Account Created!");
        goHome();
    })
    .catch(err => {
        alert(err.message);
        btn.disabled = false;
    });
}

function logout(){ auth.signOut().then(() => location.reload()); }

// AUTH MONITOR
auth.onAuthStateChanged(user => {
    if(user){
        document.getElementById("profileSection").style.display = "block";
        document.getElementById("bottomNav").style.display = "flex";
        document.getElementById("authButtons").style.display = "none";
        document.getElementById("logoutBtn").style.display = "block";

        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if(doc.exists){
                document.getElementById("dispName").innerText = "Hi, " + doc.data().name;
                document.getElementById("dispWallet").innerText = doc.data().wallet;
            }
        });
    }
});
</script>
</body>
</html>
