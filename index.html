<!DOCTYPE html>
<html>
<head>
<title>RRP Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* Header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.3);
}

.header button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#ff9800;
color:white;
font-weight:bold;
}

/* Notice */
.notice{
background:#ff9800;
padding:8px;
text-align:center;
font-weight:bold;
}

/* Home Section */
.home-section{
padding:20px;
text-align:center;
}

/* 4 ICON ROW */
.top-section{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:nowrap;
}

.box{
flex:1;
max-width:90px;
height:95px;
background:white;
border-radius:18px;
color:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
font-weight:bold;
font-size:13px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
}

.box img{
width:35px;
margin-bottom:6px;
}

/* Profile Card */
.profile{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
display:none;
}

/* Auth Pages */
.auth-page{
display:none;
padding:30px 20px;
text-align:center;
}

.auth-page input{
width:90%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

.auth-page button{
padding:12px;
width:95%;
background:#ff9800;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
margin-top:10px;
}

/* Bottom Nav */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
color:black;
display:none;
justify-content:space-around;
padding:12px 0;
}

.bottom-nav button{
background:none;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h3>RRP Earn</h3>
<div>
<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>
</div>
</div>

<div class="notice">
🔥 Join Telegram & Earn 130₹ Instantly 🔥
</div>

<!-- HOME PAGE -->
<div class="home-section" id="homePage">

<div class="top-section">
<a href="https://t.me/rrp_major" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Telegram
</a>

<a href="https://whatsapp.com/channel/0029VbBaUEMKwqSQghpNNm04" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
WhatsApp
</a>

<a href="#" class="box">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
Chat Us
</a>

<a href="https://youtube.com/@animationn-story" class="box" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
YouTube
</a>
</div>

<div class="profile" id="profileSection">
<h2 id="username">Guest User</h2>
<h1>₹ <span id="wallet">0</span></h1>
</div>

</div>

<!-- LOGIN PAGE -->
<div class="auth-page" id="loginPage">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="loginUser()">Login</button>
<button onclick="goHome()">Back</button>
</div>

<!-- REGISTER PAGE -->
<div class="auth-page" id="registerPage">
<h2>Register</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<input type="text" id="inviteCode" placeholder="Invitation Code">
<button onclick="registerUser()">Register</button>
<button onclick="goHome()">Back</button>
</div>

<div class="bottom-nav" id="bottomNav">
<button onclick="goHome()">Home</button>
<button>Team</button>
<button>Task</button>
<button>Withdraw</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCIXwtirHUvLfReJziJ7Oyy975Kpr5ZDOU",
  authDomain: "rrp-earn-app.firebaseapp.com",
  projectId: "rrp-earn-app",
  storageBucket: "rrp-earn-app.firebasestorage.app",
  messagingSenderId: "808141347086",
  appId: "1:808141347086:web:909793490facec38aadf5f",
  measurementId: "G-J6X9KHPXJQ"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* Page Switch */
function showLogin(){
homePage.style.display="none";
registerPage.style.display="none";
loginPage.style.display="block";
}

function showRegister(){
homePage.style.display="none";
loginPage.style.display="none";
registerPage.style.display="block";
}

function goHome(){
homePage.style.display="block";
loginPage.style.display="none";
registerPage.style.display="none";
}

/* Register */
function registerUser(){
let name=name.value;
let email=email.value;
let password=password.value;
let confirm=confirmPassword.value;

if(password!==confirm){
alert("Passwords do not match");
return;
}

auth.createUserWithEmailAndPassword(email,password)
.then((userCredential)=>{
let user=userCredential.user;

db.collection("users").doc(user.uid).set({
name:name,
email:email,
wallet:0,
createdAt:new Date()
});

alert("Registration Successful!");
goHome();
})
.catch((error)=>{
alert(error.message);
});
}

/* Login */
function loginUser(){
auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value)
.then(()=>{
alert("Login Successful!");
goHome();
})
.catch((error)=>{
alert(error.message);
});
}

/* Auth State */
auth.onAuthStateChanged((user)=>{
if(user){

profileSection.style.display="block";
bottomNav.style.display="flex";

db.collection("users").doc(user.uid)
.onSnapshot((doc)=>{
if(doc.exists){
username.innerText=doc.data().name;
wallet.innerText=doc.data().wallet;
}
});

}else{

profileSection.style.display="none";
bottomNav.style.display="none";
username.innerText="Guest User";
wallet.innerText="0";
}
});

</script>

</body>
</html>
