<!DOCTYPE html>
<html>
<head>
<title>My Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

/* IMAGE SECTION */
.top-banner{
    width:100%;
    height:33vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#fff;
}

.top-banner img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

/* CONTENT */
.content{
    padding:20px;
    text-align:center;
}

/* HIDDEN SECTION */
.hidden{
    display:none;
}

input{
    padding:10px;
    width:80%;
    max-width:300px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    background:#ff3c3c;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#e60000;
}
</style>
</head>

<body>

<!-- TOP IMAGE -->
<div class="top-banner">
    <img src="https://i.ibb.co/YOUR-IMAGE-LINK.jpg" alt="Top Image">
</div>

<div class="content">

    <!-- LOGIN SECTION -->
    <div id="loginSection">
        <h2>Login</h2>
        <input type="text" id="nameInput" placeholder="Enter Your Name">
        <br>
        <button onclick="login()">Login</button>
    </div>

    <!-- USER SECTION (Hidden Before Login) -->
    <div id="userSection" class="hidden">
        <h2 id="username"></h2>
        <p id="balance">Balance: ₹500</p>

        <button>Recharge</button>
        <button>Withdraw</button>
        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>

function login(){
    var name = document.getElementById("nameInput").value;

    if(name == ""){
        alert("Please enter your name");
        return;
    }

    document.getElementById("username").innerText = "Welcome " + name + " 🔥";

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("userSection").style.display = "block";
}

function logout(){
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("userSection").style.display = "none";
    document.getElementById("nameInput").value = "";
}

</script>

</body>
</html>
