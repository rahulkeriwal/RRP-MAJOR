<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RRP Earn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f2027;
            color: white;
            text-align: center;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0,0,0,0.5);
        }

        .header button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Banner */
        .top-banner img {
            width: 90%;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Notice */
        .notice {
            background: #ff9800;
            padding: 10px;
            margin: 15px 0;
            font-weight: bold;
        }

        /* Profile Section */
        #profileSection {
            background: rgba(255,255,255,0.1);
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        /* Forms */
        .auth-page {
            display: none;
            padding: 20px;
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        .btn-main {
            width: 90%;
            padding: 12px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: none;
            justify-content: space-around;
            padding: 10px 0;
        }
        
        .bottom-nav button { color: #333; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<div class="header">
    <h3>RRP Earn</h3>
    <div id="authMenu">
        <button onclick="showPage('loginPage')">Login</button>
        <button onclick="showPage('registerPage')">Register</button>
    </div>
    <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="top-banner">
    <img src="Gemini_Generated_Image_wg6zcowg6zcowg6z.jpg" alt="RRM Banner">
</div>

<div class="notice">🔥 Join Telegram & Earn 130₹ Instantly 🔥</div>

<div id="homePage">
    <div id="profileSection">
        <h2 id="userName">User</h2>
        <h1>₹ <span id="userWallet">0</span></h1>
    </div>
    <p>Please Login to see your tasks.</p>
</div>

<div id="loginPage" class="auth-page">
    <h2>Login</h2>
    <input type="email" id="lEmail" placeholder="Email">
    <input type="password" id="lPass" placeholder="Password">
    <button class="btn-main" onclick="login()">Login</button>
    <p onclick="showPage('homePage')">Back</p>
</div>

<div id="registerPage" class="auth-page">
    <h2>Register</h2>
    <input type="text" id="rName" placeholder="Full Name">
    <input type="email" id="rEmail" placeholder="Email">
    <input type="password" id="rPass" placeholder="Password">
    <button class="btn-main" onclick="register()">Register Now</button>
    <p onclick="showPage('homePage')">Back</p>
</div>

<div class="bottom-nav" id="bottomNav">
    <button onclick="showPage('homePage')">Home</button>
    <button>Task</button>
    <button>Withdraw</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// APNA CONFIG YAHA DALEIN
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function showPage(id) {
    document.getElementById('homePage').style.display = id === 'homePage' ? 'block' : 'none';
    document.getElementById('loginPage').style.display = id === 'loginPage' ? 'block' : 'none';
    document.getElementById('registerPage').style.display = id === 'registerPage' ? 'block' : 'none';
}

function register() {
    const name = document.getElementById('rName').value;
    const email = document.getElementById('rEmail').value;
    const pass = document.getElementById('rPass').value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCredential => {
        return db.collection("users").doc(userCredential.user.uid).set({
            name: name,
            wallet: 130
        });
    })
    .then(() => { alert("Success!"); showPage('homePage'); })
    .catch(err => alert(err.message));
}

function login() {
    const email = document.getElementById('lEmail').value.trim();
    const pass = document.getElementById('lPass').value;

    // Direct Firebase sign-in
    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("Logged In!");
        showPage('homePage');
    })
    .catch(err => alert("Login Error: " + err.message));
}

function logout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('profileSection').style.display = 'block';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('authMenu').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
        
        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('userName').innerText = "Hi, " + doc.data().name;
                document.getElementById('userWallet').innerText = doc.data().wallet;
            }
        });
    }
});
</script>
</body>
</html>
