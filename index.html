<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <meta charset="UTF-8">
    <title>RRP Earn - Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; font-family:'Segoe UI', sans-serif; background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; min-height:100vh; overflow-x: hidden; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:15px; background:rgba(0,0,0,0.3); }
        .header button { padding:8px 14px; border:none; border-radius:6px; background:#ff9800; color:white; font-weight:bold; cursor:pointer; }
        .notice-wrapper { background:#ff9800; overflow:hidden; white-space:nowrap; }
        .notice-text { display:inline-block; padding:8px 0; font-weight:bold; animation:slide 10s linear infinite; }
        @keyframes slide { from { transform:translateX(100%); } to { transform:translateX(-100%); } }
        .page-section { display:none; padding:15px; text-align:center; padding-bottom:100px; }
        #homePage { display:block; }
        .top-section { display:flex; justify-content:space-between; gap:10px; margin-top:20px; }
        .box { flex:1; height:90px; background:white; border-radius:15px; color:black; display:flex; flex-direction:column; justify-content:center; align-items:center; text-decoration:none; font-weight:bold; font-size:11px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
        .box img { width:30px; margin-bottom:5px; }
        .profile { margin-top:25px; display:none; }
        .wallet-box { margin-top:15px; background:rgba(255,255,255,0.2); padding:15px; border-radius:15px; border: 1px solid rgba(255,255,255,0.3); }
        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .task-card { background: #6a4fa3; border-radius: 20px; padding: 15px; text-align: left; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .reward-tag { position: absolute; top: 12px; right: 10px; background: red; color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .action-btn { width: 100%; padding: 8px; border: none; border-radius: 10px; background: white; color: #6a4fa3; font-weight: bold; cursor: pointer; }
        .action-btn:disabled { background: #ccc; color: #666; cursor: not-allowed; }

        /* VIDEO POPUP */
        .video-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; flex-direction:column; }
        .modal-content { width:85%; max-width:340px; background:#000; border-radius:20px; overflow:hidden; position:relative; }
        #modalFrame iframe { width:100%; height:500px; border:none; pointer-events: none; } /* prevents skipping */
        
        .auth-page input { width:90%; padding:12px; margin:10px 0; border-radius:8px; border:none; }
        .auth-page button { padding:12px; width:95%; background:#ff9800; border:none; border-radius:8px; color:white; font-weight:bold; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:white; display:none; justify-content:space-around; padding:10px 0; border-radius:20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 1000; }
        .nav-item { display:flex; flex-direction:column; align-items:center; background:none; border:none; color:#555; font-size:12px; font-weight:600; flex:1; }
        .nav-item i { font-size:20px; margin-bottom:4px; color:#f39c12; }
    </style>
</head>
<body>

<div class="header">
    <h3>RRP Earn</h3>
    <div id="authButtons">
        <button onclick="showPage('loginPage')">Login</button>
        <button onclick="showPage('registerPage')">Register</button>
    </div>
    <div id="logoutBtn" style="display:none;"><button onclick="logout()">Logout</button></div>
</div>

<div class="notice-wrapper"><div class="notice-text">🔥 Complete Video Tasks to Earn 51₹ Instantly! 🔥</div></div>

<div class="page-section" id="homePage">
    <div class="top-section">
        <a href="https://t.me/rrp_major" class="box" target="_blank">Telegram</a>
        <a href="https://whatsapp.com/channel/0029VbBaUEMKwqSQghpNNm04" class="box" target="_blank">WhatsApp</a>
        <a href="https://youtube.com/@animationn-story" class="box" target="_blank">YouTube</a>
    </div>
    <div class="profile" id="profileSection">
        <h2 id="dispName">Welcome</h2>
        <div class="wallet-box"><h3>Balance: ₹ <span id="dispWallet">0</span></h3></div>
    </div>
</div>

<div class="page-section" id="taskPage">
    <div class="task-grid">
        <div class="task-card">
            <div class="reward-tag">+51 INR</div>
            <h4>Watch Shorts</h4>
            <p>Watch full video to earn</p>
            <button class="action-btn" id="btnTask1" onclick="openVideoPopup('YOUR_SHORTS_ID', 1, 15)">▶ Start Task</button>
        </div>
    </div>
</div>

<div class="video-modal" id="videoModal">
    <div class="modal-content">
        <div id="modalFrame"></div>
    </div>
    <div style="margin-top:15px; text-align:center;">
        <p id="timerText" style="color:#ff9800; font-weight:bold;"></p>
        <button id="claimBtn" style="padding:12px 25px; background:#4caf50; color:white; border:none; border-radius:10px; display:none; font-weight:bold;" onclick="completeTask(1, 51)">CLAIM 51₹ NOW</button>
    </div>
</div>

<div class="page-section auth-page" id="loginPage">
    <h2>Login</h2>
    <input type="email" id="lEmail" placeholder="Email"><br>
    <input type="password" id="lPass" placeholder="Password"><br>
    <button onclick="loginUser()">Login</button>
    <p onclick="showPage('forgotPage')">Forgot Password?</p>
</div>

<div class="page-section auth-page" id="registerPage">
    <h2>Register</h2>
    <input type="text" id="rName" placeholder="Name"><br>
    <input type="email" id="rEmail" placeholder="Email"><br>
    <input type="password" id="rPass" placeholder="Password"><br>
    <input type="password" id="rCPass" placeholder="Confirm"><br>
    <button onclick="registerUser()">Register</button>
</div>

<div class="page-section auth-page" id="forgotPage">
    <h2>Reset Password</h2>
    <input type="email" id="fEmail" placeholder="Email"><br>
    <button onclick="resetPassword()">Send Link</button>
</div>

<div class="bottom-nav" id="bottomNav">
    <button class="nav-item" onclick="showPage('homePage')"><i class="fa fa-house"></i>Home</button>
    <button class="nav-item" onclick="showPage('taskPage')"><i class="fa fa-list"></i>Task</button>
    <button class="nav-item"><i class="fa fa-wallet"></i>Wallet</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIXwtirHUvLfReJziJ7Oyy975Kpr5ZDOU",
  authDomain: "rrp-earn-app.firebaseapp.com",
  projectId: "rrp-earn-app",
  storageBucket: "rrp-earn-app.firebasestorage.app",
  messagingSenderId: "808141347086",
  appId: "1:808141347086:web:909793490facec38aadf5f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function showPage(id) {
    document.querySelectorAll('.page-section').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

/* AUTH LOGIC */
function loginUser() { auth.signInWithEmailAndPassword(lEmail.value, lPass.value).catch(e => alert(e.message)); }
function registerUser() {
    if(rPass.value!==rCPass.value){alert("Mismatch"); return;}
    auth.createUserWithEmailAndPassword(rEmail.value, rPass.value).then(res => {
        db.collection("users").doc(res.user.uid).set({name:rName.value, wallet:130, email:rEmail.value});
    }).catch(e => alert(e.message));
}
function resetPassword() { auth.sendPasswordResetEmail(fEmail.value).then(()=>alert("Sent")).catch(e=>alert(e.message)); }
function logout() { auth.signOut().then(() => location.reload()); }

/* TASK LOGIC */
let taskTimer;
function openVideoPopup(videoId, taskId, seconds) {
    const videoModal = document.getElementById('videoModal');
    const modalFrame = document.getElementById('modalFrame');
    const timerText = document.getElementById('timerText');
    const claimBtn = document.getElementById('claimBtn');

    videoModal.style.display = "flex";
    // mute=1 is required for Autoplay on most browsers
    modalFrame.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&rel=0&playsinline=1" allow="autoplay"></iframe>`;
    
    let timeLeft = seconds;
    claimBtn.style.display = "none";
    timerText.innerText = `Watch for ${timeLeft} seconds...`;
    
    if(taskTimer) clearInterval(taskTimer);
    taskTimer = setInterval(() => {
        timeLeft--;
        if(timeLeft > 0) {
            timerText.innerText = `Watch for ${timeLeft} more seconds...`;
        } else {
            clearInterval(taskTimer);
            timerText.innerText = "Video Completed! Unmute and Enjoy.";
            claimBtn.style.display = "block";
        }
    }, 1000);
}

function completeTask(id, amt) {
    const user = auth.currentUser;
    if(!user) return;
    const ref = db.collection("users").doc(user.uid);
    ref.get().then(doc => {
        const newTotal = (doc.data().wallet || 0) + amt;
        ref.update({ wallet: newTotal }).then(() => {
            alert("51₹ added to your wallet!");
            document.getElementById("btnTask"+id).innerText = "Completed ✅";
            document.getElementById("btnTask"+id).disabled = true;
            document.getElementById('videoModal').style.display = "none";
            document.getElementById('modalFrame').innerHTML = "";
        });
    });
}

auth.onAuthStateChanged(user => {
    if(user){
        showPage('homePage');
        profileSection.style.display="block";
        bottomNav.style.display="flex";
        authButtons.style.display="none";
        logoutBtn.style.display="block";
        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if(doc.exists){
                dispName.innerText = "Welcome, " + doc.data().name;
                dispWallet.innerText = doc.data().wallet;
            }
        });
    }
});
</script>
</body>
</html>
