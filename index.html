<!DOCTYPE html>
<html>
<head>
<title>Earn Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

/* Notice Slider */
.notice{
    background:#ff9800;
    color:white;
    padding:8px;
    font-weight:bold;
}

/* Top Buttons Section */
.top-section{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px 10px;
    flex-wrap:wrap;
}

.box{
    width:100px;
    height:100px;
    background:white;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:black;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.05);
}

.box img{
    width:40px;
    margin-bottom:8px;
}

/* User Profile */
.profile{
    text-align:center;
    margin-top:20px;
}

.profile img{
    width:80px;
    border-radius:50%;
}

.profile h3{
    margin:10px 0 5px;
}

/* Bottom Navigation */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.bottom-nav button{
    background:none;
    border:none;
    font-size:14px;
}

</style>
</head>

<body>

<!-- Notice Sliding -->
<div class="notice">
<marquee>🔥 Join Telegram & Earn 130₹ Instantly | Refer & Earn More 🔥</marquee>
</div>

<!-- 3 Boxes -->
<div class="top-section">

    <a href="https://t.me/rrp_major" class="box">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
        Telegram
    </a>

    <a href="https://whatsapp.com/channel/0029VbBaUEMKwqSQghpNNm04" class="box">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        WhatsApp
    </a>

    <a href="#" class="box">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
        Chat Us
    </a>

</div>

<!-- Profile -->
<div class="profile">
    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <h3>User Name</h3>
    <p>Wallet Balance: ₹0</p>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button>Home</button>
    <button>Team</button>
    <button>Task</button>
    <button>Withdraw</button>
</div>

</body>
</html>
