<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRP Major</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:#7b4ba3;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.balance{
background:white;
color:black;
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

.icon-section{
display:flex;
justify-content:space-around;
margin:20px 15px;
}

.icon-box{
background:white;
width:30%;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

.icon-box i{
font-size:28px;
margin-bottom:8px;
}

.chat i{color:#4CAF50;}
.telegram i{color:#0088cc;}
.whatsapp i{color:#25D366;}

.profile{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:15px;
}

.profile img{
width:70px;
border-radius:50%;
}

.wallet{
font-weight:bold;
color:#7b4ba3;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 5px rgba(0,0,0,0.2);
}

.navbar button{
background:none;
border:none;
font-size:14px;
font-weight:bold;
cursor:pointer;
}
a{
text-decoration:none;
color:inherit;
}
</style>
</head>

<body>

<div class="header">
<div>RRP Major</div>
<div class="balance">₹ 0</div>
</div>

<div class="icon-section">

<div class="icon-box chat">
<i class="fa-solid fa-comments"></i>
<div>Chat Us</div>
</div>

<a href="https://t.me/rrp_major" target="_blank">
<div class="icon-box telegram">
<i class="fa-brands fa-telegram"></i>
<div>Telegram</div>
</div>
</a>

<a href="https://whatsapp.com/channel/yourchannel" target="_blank">
<div class="icon-box whatsapp">
<i class="fa-brands fa-whatsapp"></i>
<div>WhatsApp</div>
</div>
</a>

</div>

<div class="profile">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
<div>
<div><b>Rahul</b></div>
<div class="wallet">Wallet: ₹ 0</div>
</div>
</div>

<div class="navbar">
<button>Home</button>
<button>Team</button>
<button>Task</button>
<button>Withdraw</button>
</div>

</body>
</html>
